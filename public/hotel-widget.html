<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LuxeStays</title>
  <style>
    :root {
      --bg-body: #1F1F1F;
      --bg-card: #2B2B2B;
      --text-main: #FFFFFF;
      --text-muted: #A1A1A1;
      --accent: #006CE4;
      --accent-hover: #0056B3;
      --star-color: #FEBB02;
    }
    html, body {
      width: 100%;
      min-height: 100%;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 16px;
      background: var(--bg-body);
      color: var(--text-main);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }
    .header {
      margin-bottom: 20px;
    }
    .header h2 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .header p {
      margin: 4px 0 0;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .hotel-list {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 16px;
      scrollbar-width: none; /* Firefox */
    }
    .hotel-list::-webkit-scrollbar {
      display: none; /* Chrome */
    }
    .hotel-card {
      min-width: 280px;
      max-width: 280px;
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .hotel-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .hotel-content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .rating-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .stars {
      color: var(--star-color);
      font-size: 14px;
      letter-spacing: 2px;
    }
    .score-badge {
      background: var(--accent);
      color: white;
      padding: 6px 8px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1rem;
    }
    .hotel-title {
      margin: 0 0 8px;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .reviews {
      font-size: 0.85rem;
      margin-bottom: 4px;
    }
    .location {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .amenities {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .amenity {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .price-section {
      margin-top: auto;
      margin-bottom: 16px;
    }
    .price-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .price-value {
      font-size: 1.25rem;
      font-weight: bold;
      margin: 4px 0;
    }
    .price-taxes {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .cta-button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      width: 100%;
    }
    .cta-button:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Stays that match your search</h2>
    <p id="search-details">Loading...</p>
  </div>
  
  <div class="hotel-list" id="hotel-container">
    <!-- Cards will be injected here -->
  </div>

  <script type="module">
    const container = document.getElementById("hotel-container");
    const searchDetails = document.getElementById("search-details");

    const render = (data) => {
      container.innerHTML = "";
      if (data.metadata) {
        searchDetails.textContent = `${data.metadata.dates} · ${data.metadata.travelers}`;
      }
      
      data.hotels.forEach((hotel) => {
        const starHTML = '★'.repeat(hotel.stars);
        
        const amenitiesHTML = hotel.amenities.map(a => `
          <div class="amenity">
            <span>${a.icon}</span> ${a.label}
          </div>
        `).join("");

        const card = document.createElement("div");
        card.className = "hotel-card";
        card.innerHTML = `
          <img class="hotel-image" src="${hotel.image}" alt="${hotel.title}" />
          <div class="hotel-content">
            <div class="rating-row">
              <div class="stars">${starHTML}</div>
              <div class="score-badge">${hotel.score}</div>
            </div>
            <h3 class="hotel-title">${hotel.title}</h3>
            <div class="reviews">${hotel.reviewText} · ${hotel.reviewCount} reviews</div>
            <div class="location">${hotel.location}</div>
            
            <div class="amenities">
              ${amenitiesHTML}
            </div>

            <div class="price-section">
              <div class="price-label">Price from</div>
              <div class="price-value">${hotel.price} <span style="font-size: 0.9rem; font-weight: normal; color: var(--text-muted)">/ ${hotel.nights} nights</span></div>
              <div class="price-taxes">Includes taxes and fees</div>
            </div>
            
            <a href="#" class="cta-button" onclick="event.preventDefault(); window.open('https://google.com/search?q=${encodeURI(hotel.title)}', '_blank');">View on LuxeStays</a>
          </div>
        `;
        container.appendChild(card);
      });
    };

    const updateFromResponse = (response) => {
      if (response?.structuredContent?.data) {
        render(response.structuredContent.data);
      }
    };

    // MCP Apps standard bridge
    let rpcId = 0;
    const pendingRequests = new Map();

    const rpcNotify = (method, params) => {
      window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
    };

    const rpcRequest = (method, params) =>
      new Promise((resolve, reject) => {
        const id = ++rpcId;
        pendingRequests.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
      });

    window.addEventListener(
      "message",
      (event) => {
        if (event.source !== window.parent) return;

        const message = event.data;
        if (!message || message.jsonrpc !== "2.0") return;

        // Responses
        if (typeof message.id === "number") {
          const pending = pendingRequests.get(message.id);
          if (!pending) return;
          pendingRequests.delete(message.id);
          if (message.error) {
            pending.reject(message.error);
            return;
          }
          pending.resolve(message.result);
          return;
        }

        // Notifications
        if (typeof message.method !== "string") return;
        if (message.method === "ui/notifications/tool-result") {
          updateFromResponse(message.params);
        }
      },
      { passive: true }
    );

    const initializeBridge = async () => {
      const appInfo = { name: "luxestays-widget", version: "0.1.0" };
      const appCapabilities = {};
      const protocolVersion = "2026-01-26";
      try {
        await rpcRequest("ui/initialize", {
          appInfo,
          appCapabilities,
          protocolVersion,
        });
        rpcNotify("ui/notifications/initialized", {});
      } catch (error) {
        console.error("Failed to initialize the MCP Apps bridge:", error);
      }
    };

    const bridgeReady = initializeBridge();

    const callSearchTool = async () => {
      // Hardcode initial fetch for "dubai"
      await bridgeReady;
      const response = await rpcRequest("tools/call", {
        name: "search_hotels",
        arguments: { location: "dubai" },
      });
      updateFromResponse(response);
    };

    // Initialize with data from model if not loaded yet
    callSearchTool();
  </script>
</body>
</html>
