<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Silhouette Store Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Official Palette */
      --silh-teal: #00B5CC;
      --silh-navy: #111827;
      --silh-bg: #F8FAFC;
      --silh-card: #FFFFFF;
      --silh-border: #E2E8F0;
      
      --text-main: #111827;
      --text-sub: #64748B;
      --text-muted: #94A3B8;
      
      --font-brand: 'Montserrat', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    
    @media (prefers-color-scheme: dark) {
      :root {
        --silh-bg: #0F172A;
        --silh-card: #1E293B;
        --silh-border: #334155;
        --text-main: #F8FAFC;
        --text-sub: #94A3B8;
        --text-muted: #64748B;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: transparent; overflow-x: hidden; color: var(--text-main); padding-top: 10px; }

    .products-carousel { display: flex; gap: 20px; padding: 0 20px 30px; overflow-x: auto; scrollbar-width: none; align-items: stretch; }
    .products-carousel::-webkit-scrollbar { display: none; }

    .card { flex: 0 0 260px; background: var(--silh-card); border-radius: 12px; border: 1px solid var(--silh-border); overflow: hidden; display: flex; flex-direction: column; position: relative; transition: all 0.3s ease; cursor: pointer; }
    .card:hover { transform: translateY(-6px); border-color: var(--silh-teal); box-shadow: 0 15px 30px rgba(0, 181, 204, 0.15); }

    .stock-tag { position: absolute; top: 12px; right: 12px; color: white; font-size: 0.65rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; z-index: 2; text-transform: uppercase; }
    .stock-tag.in-stock { background: #10B981; }
    .stock-tag.out-of-stock { background: #EF4444; }

    .img-box { width: 100%; height: 220px; background: #FFF; padding: 25px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--silh-border); }
    .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .content { padding: 18px; display: flex; flex-direction: column; flex: 1; }
    .sku { font-size: 0.65rem; color: var(--text-sub); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
    .title { font-family: var(--font-brand); font-size: 0.95rem; font-weight: 700; line-height: 1.4; color: var(--text-main); margin-bottom: 15px; height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }
    
    .price-row { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--silh-border); margin-bottom: 16px; display: flex; align-items: baseline; gap: 10px; }
    .price { font-family: var(--font-brand); font-size: 1.3rem; font-weight: 800; color: var(--silh-teal); }
    .price-old { font-size: 0.9rem; color: var(--text-muted); text-decoration: line-through; font-weight: 500; }

    .btn-action { background: var(--silh-teal); color: #FFFFFF !important; border: none; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; width: 100%; transition: opacity 0.2s; }
    .btn-action:hover { opacity: 0.9; }

    .shimmer { background: var(--silh-border); background-image: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 100%); background-repeat: no-repeat; background-size: 800px 100%; animation: shimmer 2s infinite linear; }
    @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
    .sh-img { width: 100%; height: 220px; }
    .sh-line { height: 12px; margin: 15px 18px; border-radius: 4px; }
  </style>
</head>
<body>

  <div id="container">
    <div class="products-carousel">
      <div class="card"><div class="shimmer sh-img"></div><div class="shimmer sh-line" style="width:60%;"></div><div class="shimmer sh-line"></div></div>
      <div class="card"><div class="shimmer sh-img"></div><div class="shimmer sh-line" style="width:60%;"></div><div class="shimmer sh-line"></div></div>
    </div>
  </div>

  <script>
    const rpcNotify = (m, p) => window.parent.postMessage({ jsonrpc: "2.0", method: m, params: p }, "*");
    const rpcRequest = (m, p) => new Promise((res) => {
      const id = Date.now();
      const handler = (e) => { if(e.data?.id === id) { window.removeEventListener("message", handler); res(e.data.result); } };
      window.addEventListener("message", handler);
      window.parent.postMessage({ jsonrpc: "2.0", id, method: m, params: p }, "*");
    });

    window.addEventListener("message", (e) => {
      if (e.source !== window.parent) return;
      if (e.data?.method === "ui/notifications/tool-result") {
        const payload = e.data.params?.structuredContent?.data || e.data.params?.data || null;
        if (payload?.products) renderList(payload.products);
      }
    });

    const start = async () => {
      try {
        await rpcRequest("ui/initialize", { appInfo: { name: "silh", version: "1.8" }, appCapabilities: {}, protocolVersion: "2026-01-26" });
        setTimeout(() => rpcNotify("ui/notifications/initialized", {}), 100);
      } catch (e) {}
    };
    start();

    function renderList(products) {
      const container = document.getElementById("container");
      if (!products || products.length === 0) { container.innerHTML = '<div style="padding:40px; text-align:center; opacity:0.5;">No products found.</div>'; return; }
      container.innerHTML = `<div class="products-carousel">${products.map(p => {
        const isOut = p.status === "Out of stock";
        return `
          <div class="card" onclick="window.open('${p.link}', '_blank')">
            <div class="stock-tag ${isOut ? 'out-of-stock' : 'in-stock'}">${p.status}</div>
            <div class="img-box"><img src="${p.image}" alt="${p.title}" onerror="this.src='https://www.silhouetteamerica.com/media/catalog/product/placeholder/default/silhouette-logo.png';"></div>
            <div class="content">
              <div class="sku">SKU: ${p.sku}</div>
              <div class="title">${p.title}</div>
              <div class="price-row">
                ${p.originalPrice ? `<div class="price-old">${p.originalPrice}</div>` : ""}
                <div class="price">${p.price}</div>
              </div>
              <button class="btn-action" onclick="event.stopPropagation(); window.open('${p.link}', '_blank')">View Product Details</button>
            </div>
          </div>
        `;
      }).join("")}</div>`;
    }
  </script>
</body>
</html>
